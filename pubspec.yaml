name: booking_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_lints: ^6.0.0
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  injectable: ^2.7.1+4
  flutter_secure_storage: ^10.0.0
  equatable: ^2.0.8

  dio: ^5.9.2
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  shared_preferences: ^2.5.4
  talker_flutter: ^5.1.15
  talker: ^5.1.15
  talker_bloc_logger: ^5.1.15
  talker_dio_logger: ^5.1.15
  auto_route: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.13.0
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  injectable_generator: ^2.12.1
  auto_route_generator: ^10.5.0

flutter:
  uses-material-design: true


  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/
    - assets/logo/
    - assets/images/
    - assets/svgs/

  fonts:
    - family: Be Vietnam Pro
      fonts:
        - asset: assets/fonts/BeVietnamPro-Regular.ttf
        - asset: assets/fonts/BeVietnamPro-Medium.ttf
          weight: 500
        - asset: assets/fonts/BeVietnamPro-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/BeVietnamPro-Bold.ttf
          weight: 700